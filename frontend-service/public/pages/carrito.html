<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | EmprendeMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="/css/estilos.css" rel="stylesheet">
  <link href="/css/marketplace.css" rel="stylesheet">
  <link href="/css/carrito.css" rel="stylesheet">
</head>
<body class="bg-background">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-white shadow-soft sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <span class="material-symbols-outlined text-primary me-2" style="font-size:28px">storefront</span>
        <span class="fw-bold text-dark">emprendemarket</span>
      </a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <a href="/marketplace" class="btn btn-outline-secondary btn-sm">
          <span class="material-symbols-outlined icon-sm me-1">arrow_back</span>Seguir comprando
        </a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h3 class="fw-bold mb-4">
      <span class="material-symbols-outlined me-2">shopping_cart</span>Tu Carrito
    </h3>

    <div class="row g-4">
      <!-- Items -->
      <div class="col-lg-8">
        <div class="card shadow-soft">
          <div class="card-body">

            <!-- Loading -->
            <div id="carrito-loading" class="text-center py-5">
              <div class="spinner-border text-primary"></div>
              <p class="mt-2 text-muted">Cargando carrito...</p>
            </div>

            <!-- Vacío -->
            <div id="carrito-empty" class="text-center py-5 d-none">
              <span class="material-symbols-outlined icon-xl text-muted">shopping_cart</span>
              <h5 class="mt-3">Tu carrito está vacío</h5>
              <p class="text-muted">Explora el marketplace y agrega productos</p>
              <a href="/marketplace" class="btn btn-primary">
                <span class="material-symbols-outlined icon-sm me-2">storefront</span>Ir al Marketplace
              </a>
            </div>

            <!-- Items -->
            <div id="carrito-items" class="d-none"></div>

          </div>
          <div id="carrito-footer" class="card-footer bg-transparent d-none">
            <button class="btn btn-outline-danger btn-sm" onclick="vaciarCarrito()">
              <span class="material-symbols-outlined icon-sm me-1">delete_sweep</span>Vaciar carrito
            </button>
          </div>
        </div>
      </div>

      <!-- Resumen -->
      <div class="col-lg-4">
        <div class="card shadow-soft">
          <div class="card-body">
            <h5 class="fw-bold mb-3">Resumen de compra</h5>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Subtotal</span>
              <span id="subtotal" class="fw-medium">$0</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Envío</span>
              <span id="envio" class="fw-medium text-success">$0</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-4">
              <strong class="fs-5">Total</strong>
              <strong class="fs-5 text-primary" id="total">$0</strong>
            </div>
            <button id="btn-checkout" onclick="irACheckout()" class="btn btn-primary w-100 py-2" disabled>
              <span class="material-symbols-outlined icon-sm me-2">payment</span>Procesar Compra
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/carrito.js"></script>
</body>
</html>
