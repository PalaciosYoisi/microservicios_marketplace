<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | EmprendeMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="/css/marketplace.css" rel="stylesheet">
  <link href="/css/estilos.css" rel="stylesheet">
  <link href="/css/login.css" rel="stylesheet">
</head>
<body class="bg-background">

  <!-- Header -->
  <header class="bg-white shadow-soft animate-slide-down">
    <div class="container-fluid py-4">
      <div class="d-flex align-items-center">
        <span class="material-symbols-outlined text-primary me-3" style="font-size:40px">storefront</span>
        <a href="/" class="text-decoration-none">
          <h1 class="h2 fw-bold text-dark mb-0">EmprendeMarket</h1>
        </a>
      </div>
    </div>
  </header>

  <!-- Auth Section -->
  <section class="py-5 animate-fade-in">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card bg-white shadow-soft overflow-hidden animate-card-float">
            <!-- Tabs -->
            <div class="card-header bg-light border-0 p-0">
              <div class="d-flex border-bottom">
                <button id="login-tab" class="flex-fill py-4 px-4 text-center fw-medium border-0 bg-transparent tab-active" onclick="mostrarLogin()">
                  Iniciar Sesión
                </button>
                <button id="register-tab" class="flex-fill py-4 px-4 text-center fw-medium border-0 bg-transparent" onclick="mostrarRegistro()">
                  Registrarse
                </button>
              </div>
            </div>

            <div class="card-body p-4 p-md-5 auth-container" style="min-height:500px">

              <!-- Login Form -->
              <form id="loginForm" class="auth-form form-visible" onsubmit="handleLogin(event)">
                <h2 class="h3 text-primary fw-bold mb-4 text-center animate-slide-up">Bienvenido de vuelta</h2>

                <div id="loginAlert" class="alert d-none mb-3"></div>

                <div class="mb-4">
                  <label for="loginEmail" class="form-label fw-medium">Correo Electrónico</label>
                  <input type="email" id="loginEmail" name="correo" class="form-control form-control-lg" placeholder="tu@correo.com" required>
                </div>

                <div class="mb-4">
                  <label for="loginPassword" class="form-label fw-medium">Contraseña</label>
                  <div class="input-group">
                    <input type="password" id="loginPassword" name="contrasena" class="form-control form-control-lg" placeholder="Tu contraseña" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPassword', this)">
                      <span class="material-symbols-outlined icon-sm">visibility</span>
                    </button>
                  </div>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary btn-lg w-100 py-3 rounded-pill fw-semibold">
                  <span class="material-symbols-outlined icon-sm me-2">login</span>
                  Iniciar Sesión
                </button>

                <p class="text-center mt-4 text-muted">
                  ¿No tienes cuenta? <a href="#" onclick="mostrarRegistro()" class="text-primary fw-medium">Regístrate aquí</a>
                </p>
              </form>

              <!-- Register Form -->
              <form id="registerForm" class="auth-form form-hidden" onsubmit="handleRegister(event)">
                <h2 class="h3 text-primary fw-bold mb-4 text-center">Crear cuenta</h2>

                <div id="registerAlert" class="alert d-none mb-3"></div>

                <div class="row g-3 mb-3">
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Nombre</label>
                    <input type="text" id="regNombre" class="form-control" placeholder="Tu nombre" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Apellido</label>
                    <input type="text" id="regApellido" class="form-control" placeholder="Tu apellido" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">Correo Electrónico</label>
                  <input type="email" id="regEmail" class="form-control" placeholder="tu@correo.com" required>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">Cédula</label>
                  <input type="text" id="regCedula" class="form-control" placeholder="Tu número de cédula" required>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">Contraseña</label>
                  <div class="input-group">
                    <input type="password" id="regPassword" class="form-control" placeholder="Mínimo 6 caracteres" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('regPassword', this)">
                      <span class="material-symbols-outlined icon-sm">visibility</span>
                    </button>
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-medium">Tipo de cuenta</label>
                  <div class="row g-3">
                    <div class="col-6">
                      <div class="account-type-option" id="opt-comprador" onclick="seleccionarRol('comprador')">
                        <div class="text-center">
                          <span class="material-symbols-outlined text-primary icon-lg">shopping_bag</span>
                          <div class="fw-medium mt-2">Comprador</div>
                          <div class="small text-muted">Quiero comprar</div>
                        </div>
                      </div>
                    </div>
                    <div class="col-6">
                      <div class="account-type-option" id="opt-emprendedor" onclick="seleccionarRol('emprendedor')">
                        <div class="text-center">
                          <span class="material-symbols-outlined text-primary icon-lg">store</span>
                          <div class="fw-medium mt-2">Emprendedor</div>
                          <div class="small text-muted">Quiero vender</div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <input type="hidden" id="regRol" value="">
                </div>

                <button type="submit" id="registerBtn" class="btn btn-primary btn-lg w-100 py-3 rounded-pill fw-semibold">
                  <span class="material-symbols-outlined icon-sm me-2">person_add</span>
                  Crear Cuenta
                </button>

                <p class="text-center mt-4 text-muted">
                  ¿Ya tienes cuenta? <a href="#" onclick="mostrarLogin()" class="text-primary fw-medium">Inicia sesión</a>
                </p>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
