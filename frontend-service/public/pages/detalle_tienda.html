<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda | EmprendeMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="/css/marketplace.css" rel="stylesheet">
  <link href="/css/estilos.css" rel="stylesheet">
  <link href="/css/detalle_tienda.css" rel="stylesheet">
</head>
<body class="bg-background">

  <!-- Navbar -->
  <header class="bg-white shadow-soft sticky-top">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-light py-2">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <span class="material-symbols-outlined text-primary me-2">storefront</span>
          <span class="fw-bold">EmprendeMarket</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <a href="/marketplace?tab=tiendas" class="btn btn-outline-secondary btn-sm">
            <span class="material-symbols-outlined icon-sm me-1">store</span>Todas las tiendas
          </a>
          <a href="/marketplace" class="btn btn-outline-primary btn-sm">
            <span class="material-symbols-outlined icon-sm me-1">arrow_back</span>Marketplace
          </a>
          <a href="/carrito" class="nav-link position-relative">
            <span class="material-symbols-outlined">shopping_cart</span>
          </a>
          <div id="nav-user"></div>
        </div>
      </nav>
    </div>
  </header>

  <div id="tienda-contenido" class="container py-5">

    <!-- Banner + Logo -->
    <div id="tienda-banner" class="rounded-3 mb-4 position-relative overflow-hidden"
         style="height:160px;background:linear-gradient(135deg,#fef3c7,#fde68a)">
      <div class="position-absolute" style="bottom:-30px;left:50%;transform:translateX(-50%)">
        <div id="tienda-logo-wrap">
          <div class="rounded-circle bg-white d-flex align-items-center justify-content-center shadow"
               style="width:90px;height:90px;border:4px solid #fff">
            <span class="material-symbols-outlined text-primary" style="font-size:42px">store</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Cabecera info -->
    <div class="text-center mb-4 mt-5 pt-2">
      <h1 id="tienda-nombre" class="merriweather h2 mb-1">Cargando...</h1>
      <p id="tienda-descripcion" class="text-muted mb-2 mx-auto" style="max-width:600px"></p>
      <span class="badge bg-warning text-dark fs-6 px-3 py-2" id="tienda-categoria">General</span>
    </div>

    <!-- Info + Propietario + Stats -->
    <div class="row g-3 mb-4 justify-content-center">

      <!-- Propietario -->
      <div class="col-md-4">
        <div class="card shadow-soft h-100">
          <div class="card-body text-center">
            <div class="mb-2">
              <div id="propietario-foto-wrap"
                   class="rounded-circle bg-secondary d-inline-flex align-items-center justify-content-center"
                   style="width:56px;height:56px;overflow:hidden">
                <span class="material-symbols-outlined text-white" style="font-size:28px">person</span>
              </div>
            </div>
            <p class="small text-muted mb-1">Propietario</p>
            <p class="fw-semibold mb-0" id="propietario-nombre">—</p>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="col-md-4">
        <div class="card shadow-soft h-100">
          <div class="card-body">
            <div class="row g-2 text-center">
              <div class="col-6">
                <div class="stat-box">
                  <span class="stat-number" id="stat-productos">0</span>
                  <span class="stat-label">Productos</span>
                </div>
              </div>
              <div class="col-6">
                <div class="stat-box">
                  <span class="stat-number" id="stat-fecha">—</span>
                  <span class="stat-label">Desde</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Contacto -->
      <div class="col-md-4">
        <div class="card shadow-soft h-100">
          <div class="card-body">
            <p class="small text-muted fw-semibold mb-2">Información de contacto</p>
            <div class="d-flex flex-column gap-2">
              <div class="d-flex align-items-center gap-2 small" id="fila-horario">
                <span class="material-symbols-outlined icon-sm text-muted">schedule</span>
                <span id="tienda-horario"></span>
              </div>
              <div class="d-flex align-items-center gap-2 small" id="fila-telefono">
                <span class="material-symbols-outlined icon-sm text-muted">call</span>
                <span id="tienda-telefono"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Productos -->
    <div class="section-title">
      <span class="material-symbols-outlined">inventory_2</span>
      Productos de la tienda
    </div>

    <div class="row g-4" id="productos-grid">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Cargando productos...</p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/detalle_tienda.js"></script>
</body>
</html>
