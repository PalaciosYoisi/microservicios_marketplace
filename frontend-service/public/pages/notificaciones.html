<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Notificaciones - EmprendeMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/marketplace.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
</head>
<body class="bg-background">
    <nav class="navbar navbar-expand-lg bg-white shadow-soft sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center merriweather" href="/">
                <span class="material-symbols-outlined text-primary me-2" style="font-size:26px">storefront</span>
                <span class="fw-bold text-dark">emprendemarket</span>
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">Volver</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="merriweather mb-0">Tus Notificaciones</h3>
                    <button onclick="marcarTodasLeidas()" class="btn btn-link btn-sm text-decoration-none">Marcar todas como leídas</button>
                </div>
                
                <div id="notificaciones-lista" class="list-group shadow-sm">
                    <!-- Se cargan vía JS -->
                    <div class="text-center py-5 bg-white rounded">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/notificaciones.js"></script>
</body>
</html>
