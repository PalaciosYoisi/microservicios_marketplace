<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto - EmprendeMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/marketplace.css">
</head>
<body class="bg-background">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white shadow-soft sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="material-symbols-outlined text-primary me-2" style="font-size:26px">storefront</span>
                <span class="fw-bold text-dark">emprendemarket</span>
            </a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <a href="/carrito" class="btn btn-outline-primary position-relative">
                    <span class="material-symbols-outlined icon-sm">shopping_cart</span>
                    <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                </a>
                <div id="nav-user"></div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb small">
                <li class="breadcrumb-item"><a href="/marketplace" class="text-primary">Marketplace</a></li>
                <li class="breadcrumb-item active" id="breadcrumb-cat">Categoría</li>
            </ol>
        </nav>

        <div class="row bg-white rounded shadow-soft overflow-hidden p-4 g-4">
            <!-- Imagen del Producto -->
            <div class="col-md-6 text-center">
                <img id="prod-img" src="/img/no-image.png"
                     class="img-fluid rounded shadow-soft"
                     style="max-height:480px;object-fit:contain;width:100%"
                     onerror="this.src='/img/no-image.png'">
            </div>

            <!-- Información del Producto -->
            <div class="col-md-6">
                <h1 id="prod-nombre" class="merriweather h2 mb-2">Cargando...</h1>
                <p class="text-muted mb-3">
                    <span class="material-symbols-outlined icon-sm align-middle me-1">store</span>
                    Vendido por: <a href="#" id="tienda-link" class="text-primary text-decoration-none fw-medium"></a>
                </p>

                <!-- Precio -->
                <div class="mb-3">
                    <span id="promo-badge" class="badge bg-success mb-2 d-none" style="font-size:.85rem">¡PROMOCIÓN!</span>
                    <div class="d-flex align-items-center gap-3">
                        <h2 id="precio-actual" class="text-primary fw-bold merriweather mb-0">$0</h2>
                        <h4 id="precio-original" class="text-muted text-decoration-line-through mb-0 d-none">$0</h4>
                    </div>
                    <small id="promo-desc" class="text-success fw-bold d-none"></small>
                </div>

                <!-- Descripción -->
                <p id="prod-desc" class="text-muted mb-4"></p>

                <!-- Rating promedio -->
                <div id="ratingSection" class="d-none mb-3">
                    <div class="d-flex align-items-center gap-2">
                        <span id="ratingEstrellas" class="text-warning fs-5"></span>
                        <span id="ratingPromedio" class="fw-bold"></span>
                        <span id="ratingCantidad" class="text-muted small"></span>
                    </div>
                </div>

                <!-- Tallas (se muestra solo si el producto las tiene) -->
                <div id="tallasSection" class="d-none mb-4">
                    <div class="fw-medium small mb-2">
                        <span class="material-symbols-outlined icon-sm align-middle me-1">straighten</span>
                        Talla:
                    </div>
                    <div id="tallasDisplay" class="d-flex flex-wrap gap-2"></div>
                    <div id="tallaMsgSel" class="text-muted small mt-1 d-none">Selecciona una talla</div>
                </div>

                <!-- Cantidad -->
                <div class="mb-4">
                    <label class="form-label fw-medium">Cantidad:</label>
                    <div class="d-flex align-items-center gap-3">
                        <div class="input-group" style="width:140px">
                            <button class="btn btn-outline-secondary" onclick="cambiarCant(-1)">-</button>
                            <input type="number" id="input-cant" class="form-control text-center fw-bold" value="1" min="1">
                            <button class="btn btn-outline-secondary" onclick="cambiarCant(1)">+</button>
                        </div>
                        <small id="prod-stock" class="text-muted"></small>
                    </div>
                </div>

                <!-- Botones de acción -->
                <div class="d-flex gap-2">
                    <button id="btnAgregarCarrito" onclick="agregarAlCarrito()" class="btn btn-primary btn-lg flex-grow-1">
                        <span class="material-symbols-outlined align-middle me-1">add_shopping_cart</span>Añadir al carrito
                    </button>
                    <button id="btnFav" onclick="toggleFavorito()" class="btn btn-lg btn-outline-danger" title="Añadir a favoritos">
                        <span class="material-symbols-outlined align-middle" id="iconFav">favorite_border</span>
                    </button>
                </div>

                <!-- Alert inline -->
                <div id="prodAlert" class="alert d-none mt-3"></div>
            </div>
        </div>
    </div>

    <!-- ── Sección de reseñas ── -->
    <div class="container pb-5">
        <div id="seccionResenas" class="d-none">
            <hr class="my-4">
            <h4 class="fw-bold mb-4">
                <span class="material-symbols-outlined align-middle me-2 text-warning">star</span>Reseñas de compradores
            </h4>
            <div id="listaResenas"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-notif" class="toast align-items-center text-white border-0 position-fixed bottom-0 end-0 m-3" role="alert" style="z-index:9999;min-width:260px">
        <div class="d-flex">
            <div class="toast-body" id="toast-body">Mensaje</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/detalle_producto.js"></script>
</body>
</html>
