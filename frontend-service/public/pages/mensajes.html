<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Mensajes - EmprendeMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/marketplace.css">
    <link rel="stylesheet" href="/css/mensajes.css">
</head>
<body class="bg-background">
    <div class="container-fluid py-4">
        <div class="row" style="height: 85vh;">
            <!-- Lista de conversaciones -->
            <div class="col-md-4 bg-white border-end overflow-auto h-100">
                <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Chats</h5>
                    <a href="/marketplace" class="btn btn-sm btn-link">Volver</a>
                </div>
                <div id="chats-list"></div>
            </div>

            <!-- Ventana de Chat -->
            <div class="col-md-8 d-flex flex-column h-100 bg-white">
                <div class="p-3 border-bottom bg-light">
                    <h6 id="chat-user-name" class="mb-0">Selecciona un chat</h6>
                </div>
                
                <div id="messages-container" class="flex-grow-1 p-3 overflow-auto d-flex flex-column gap-2">
                    <!-- Mensajes aquí -->
                </div>

                <div class="p-3 border-top bg-light">
                    <form id="form-msg" class="d-flex gap-2">
                        <input type="text" id="input-msg" class="form-control" placeholder="Escribe un mensaje..." disabled>
                        <button type="submit" class="btn btn-primary" id="btn-send" disabled>
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/mensajes.js"></script>
</body>
</html>
