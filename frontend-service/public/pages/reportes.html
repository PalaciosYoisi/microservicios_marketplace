<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes y PQRS - EmprendeMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/marketplace.css">
    <link rel="stylesheet" href="/css/reportes.css">
</head>
<body class="bg-background">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-soft border-0 p-4">
                    <h3 class="merriweather text-center mb-4">Enviar un Reporte</h3>
                    <p class="text-muted text-center small mb-4">¿Tienes algún problema con un pedido o un vendedor? Cuéntanos para ayudarte.</p>
                    
                    <form id="form-reporte">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tipo de incidencia</label>
                            <select id="tipo_reporte" class="form-select" required>
                                <option value="">Selecciona una opción</option>
                                <option value="pedido">Problema con mi pedido</option>
                                <option value="producto">Producto defectuoso/no coincide</option>
                                <option value="usuario">Comportamiento inadecuado del vendedor</option>
                                <option value="tecnico">Error técnico en la plataforma</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Descripción detallada</label>
                            <textarea id="descripcion" class="form-control" rows="5" placeholder="Describe lo sucedido con el mayor detalle posible..." required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Evidencia (opcional)</label>
                            <input type="file" class="form-control">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2 fw-bold">Enviar Reporte</button>
                            <a href="/marketplace" class="btn btn-link text-muted">Cancelar</a>
                        </div>
                    </form>
                    <div id="reporte-alert" class="alert mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/reportes.js"></script>
</body>
</html>
