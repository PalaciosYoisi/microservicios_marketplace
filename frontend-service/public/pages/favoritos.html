<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos - EmprendeMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/marketplace.css">
</head>
<body class="bg-background">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white shadow-soft sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="material-symbols-outlined text-primary me-2" style="font-size:26px">storefront</span>
                <span class="fw-bold text-dark">emprendemarket</span>
            </a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <a href="/marketplace" class="btn btn-outline-secondary btn-sm">
                    <span class="material-symbols-outlined icon-sm me-1">storefront</span>Marketplace
                </a>
                <a href="/comprador/dashboard" class="btn btn-outline-primary btn-sm">
                    <span class="material-symbols-outlined icon-sm me-1">dashboard</span>Mi Panel
                </a>
                <a href="/carrito" class="btn btn-outline-primary position-relative">
                    <span class="material-symbols-outlined icon-sm">shopping_cart</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">
            <span class="material-symbols-outlined me-2 text-primary">favorite</span>Mis Favoritos
        </h2>
        <div class="row g-4" id="favoritos-grid">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2 text-muted">Cargando tus favoritos...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/favoritos.js"></script>
</body>
</html>
