<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Compra Exitosa! - EmprendeMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/marketplace.css">
    <link rel="stylesheet" href="/css/confirmacion_compra.css">
</head>
<body class="bg-background">
    <div class="container py-5 text-center">
        <div class="card shadow-sm p-5 mx-auto" style="max-width: 600px;">
            <div class="mb-4">
                <span class="material-symbols-outlined text-success" style="font-size: 5rem;">check_circle</span>
            </div>
            <h2 class="merriweather mb-3">¡Gracias por tu compra!</h2>
            <p class="text-muted mb-4">Tu pedido ha sido procesado correctamente y el vendedor ha sido notificado.</p>
            
            <div class="bg-light p-3 rounded mb-4 text-start">
                <div class="d-flex justify-content-between mb-2">
                    <span>ID del Pedido:</span>
                    <strong id="conf-pedido-id">#---</strong>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Total Pagado:</span>
                    <strong id="conf-total" class="primary-color">$0</strong>
                </div>
            </div>

            <div class="d-grid gap-2">
                <a href="/comprador/dashboard" class="btn btn-primary">Ir a mis pedidos</a>
                <a href="/marketplace" class="btn btn-outline-secondary">Seguir comprando</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/confirmacion_compra.js"></script>
</body>
</html>
